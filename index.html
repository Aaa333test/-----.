<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Private Cloud Chat</title>
  <style>
    body { font-family: Arial; background:#f2f2f2; }
    .container { width:400px; margin:50px auto; background:#fff; padding:20px; border-radius:10px; }
    .chat-box { height:300px; overflow-y:auto; border:1px solid #ccc; padding:10px; margin-bottom:10px; }
    .msg { margin:5px 0; }
    .me { text-align:right; color:blue; }
    .other { text-align:left; color:gray; }
    button { padding:8px 12px; }
  </style>
</head>
<body>

<div class="container">
  <h3>Private Cloud Chat</h3>

  <div id="user"></div>
  <button onclick="login()">Войти через Google</button>
  <button onclick="logout()">Выйти</button>

  <hr>

  <div class="chat-box" id="chat"></div>

  <input id="message" placeholder="Ваше сообщение..." style="width:75%">
  <button onclick="send()">➤</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
 const firebaseConfig = {
  apiKey: "AIzaSyDrQxbUvscJpNc1LJs4XcN_xX22f_tKZs4",
  authDomain: "aaa333-98528.firebaseapp.com",
  projectId: "aaa333-98528",
  storageBucket: "aaa333-98528.firebasestorage.app",
  messagingSenderId: "593705577357",
  appId: "1:593705577357:web:a4c33f6b7fe85696b0ebc4",
  measurementId: "G-M78HTNCT29"
};

  const app = firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;

  // Вход через Google
  function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
  }

  // Выход
  function logout() {
    auth.signOut();
  }

  // Состояние пользователя
  auth.onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      document.getElementById("user").innerHTML =
        `👤 ${user.displayName}`;
    } else {
      document.getElementById("user").innerHTML = "Не авторизован";
    }
  });

  // Отправка сообщения
  function send() {
    const text = document.getElementById("message").value;
    if (!text) return;

    db.collection("messages").add({
      text: text,
      user: currentUser.displayName,
      uid: currentUser.uid,
      time: Date.now()
    });

    document.getElementById("message").value = "";
  }

  // Получение сообщений (реалтайм)
  db.collection("messages")
    .orderBy("time")
    .onSnapshot(snapshot => {
      const chat = document.getElementById("chat");
      chat.innerHTML = "";

      snapshot.forEach(doc => {
        const msg = doc.data();
        const div = document.createElement("div");

        div.className = "msg " + (msg.uid === currentUser?.uid ? "me" : "other");
        div.textContent = msg.text;

        chat.appendChild(div);
      });

      chat.scrollTop = chat.scrollHeight;
    });
</script>

</body>
</html>
