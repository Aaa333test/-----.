<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { 
        getFirestore, collection, addDoc, query, orderBy, onSnapshot,
        serverTimestamp, updateDoc, doc, increment
    } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

   const firebaseConfig = {
  apiKey: "AIzaSyDrQxbUvscJpNc1LJs4XcN_xX22f_tKZs4",
  authDomain: "aaa333-98528.firebaseapp.com",
  projectId: "aaa333-98528",
  storageBucket: "aaa333-98528.firebasestorage.app",
  messagingSenderId: "593705577357",
  appId: "1:593705577357:web:a4c33f6b7fe85696b0ebc4",
  measurementId: "G-M78HTNCT29"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ИСПРАВЛЕНО: Один инкремент за раз
    window.processLike = async (id) => {
        const docRef = doc(db, "requests", id);
        try {
            await updateDoc(docRef, { likes: increment(1) });
        } catch (e) { 
            console.error("Ошибка обновления лайка:", e.message); 
        }
    };

    document.getElementById('mainBtn').onclick = async () => {
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const btn = document.getElementById('mainBtn');

        // Базовая проверка на стороне клиента перед отправкой
        if (nameInput.value.length <= 2) {
            alert("Имя должно быть длиннее 2 символов!");
            return;
        }

        btn.disabled = true;
        try {
            await addDoc(collection(db, "requests"), {
                name: nameInput.value,
                email: emailInput.value,
                likes: 0,
                timestamp: serverTimestamp()
            });
            nameInput.value = "";
            emailInput.value = "";
        } catch (e) { 
            console.error(e);
            alert("Ошибка безопасности: Проверьте правила Firestore или вводимые данные."); 
        }
        btn.disabled = false;
    };

    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            feed.innerHTML += `
                <div class="post">
                    <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || '...'}</span>
                    <b>${data.name}</b>
                    <p style="margin: 5px 0;">${data.email}</p>
                    <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
                </div>`;
        });
    });
</script>
