<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Private Cloud Chat</title>

<style>
body {
  font-family: Arial;
  background:#eef1f5;
}

.container {
  width: 420px;
  margin: 40px auto;
  background:white;
  border-radius:12px;
  padding:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2 { text-align:center; }

.top {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.chat {
  height:300px;
  border:1px solid #ddd;
  border-radius:8px;
  padding:10px;
  overflow-y:auto;
  background:#fafafa;
}

.msg {
  margin:5px 0;
  padding:8px 12px;
  border-radius:10px;
  max-width:70%;
}

.me {
  background:#007bff;
  color:white;
  margin-left:auto;
}

.other {
  background:#e4e6eb;
}

.input {
  display:flex;
  margin-top:10px;
}

input {
  flex:1;
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  margin-left:5px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.login { background:#4285F4; color:white; }
.logout { background:#999; color:white; }
.send { background:#28a745; color:white; }
</style>
</head>

<body>

<div class="container">
  <h2>💬 Private Chat</h2>

  <div class="top">
    <button class="login" id="loginBtn">Войти</button>
    <button class="logout" id="logoutBtn">Выйти</button>
  </div>

  <div id="user"></div>

  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="message" placeholder="Написать сообщение...">
    <button class="send" id="sendBtn">➤</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { 
  getFirestore, collection, addDoc, query, orderBy, onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 ВСТАВЬ СВОЙ firebaseConfig
const firebaseConfig = {
  apiKey: "AIzaSyDrQxbUvscJpNc1LJs4XcN_xX22f_tKZs4",
  authDomain: "aaa333-98528.firebaseapp.com",
  projectId: "aaa333-98528",
  storageBucket: "aaa333-98528.firebasestorage.app",
  messagingSenderId: "593705577357",
  appId: "1:593705577357:web:a4c33f6b7fe85696b0ebc4",
  measurementId: "G-M78HTNCT29"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// 🔑 LOGIN
document.getElementById("loginBtn").onclick = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

// 🚪 LOGOUT
document.getElementById("logoutBtn").onclick = () => {
  signOut(auth);
};

// 👤 USER STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById("user").innerHTML =
      "👤 " + user.displayName;
  } else {
    currentUser = null;
    document.getElementById("user").innerHTML =
      "Не авторизован";
  }
});

// ✉️ SEND MESSAGE
document.getElementById("sendBtn").onclick = async () => {
  const text = document.getElementById("message").value;

  if (!currentUser) {
    alert("Сначала войди!");
    return;
  }

  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text: text,
    uid: currentUser.uid,
    name: currentUser.displayName,
    time: Date.now()
  });

  document.getElementById("message").value = "";
};

// 📡 REALTIME CHAT
const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  snapshot.forEach(doc => {
    const msg = doc.data();

    const div = document.createElement("div");
    div.className = "msg " + 
      (msg.uid === currentUser?.uid ? "me" : "other");

    div.textContent = msg.text;

    chat.appendChild(div);
  });

  chat.scrollTop = chat.scrollHeight;
});

</script>

</body>
</html>
